<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>67 Character — Pose Comparison</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #d6d6d8; color: #1d1d1f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  header { position: fixed; top: 0; left: 0; right: 0; padding: 16px 22px; z-index: 20; text-align: center; pointer-events: none; }
  header h1 { font-size: 16px; font-weight: 650; letter-spacing: 0.25px; }
  .comparison { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); width: 100%; height: 100%; gap: 1px; background: #b8b8bb; }
  .pose { position: relative; min-width: 0; height: 100%; background: #d6d6d8; }
  .pose-label { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); z-index: 10; padding: 7px 12px; border-radius: 999px; background: rgba(255,255,255,.82); backdrop-filter: blur(8px); font-size: 12px; font-weight: 650; letter-spacing: .25px; pointer-events: none; white-space: nowrap; }
  model-viewer { display: block; width: 100%; height: 100%; background: #d6d6d8; --poster-color: #d6d6d8; }
  footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 20px; text-align: center; font-size: 11px; color: #6e6e73; z-index: 20; pointer-events: none; }
</style>
</head>
<body>
<header><h1>67 Character — Pose Comparison</h1></header>
<main class="comparison">
  <section class="pose">
    <div class="pose-label">Arms Out</div>
    <model-viewer
      src="model.glb?v=exact-original-logo-20260717"
      camera-controls auto-rotate auto-rotate-delay="1500"
      rotation-per-second="24deg" shadow-intensity="0.6" exposure="1.05"
      camera-orbit="0deg 82deg 105%" min-camera-orbit="auto 30deg 60%"
      max-camera-orbit="auto 120deg 250%" interaction-prompt="none">
    </model-viewer>
  </section>
  <section class="pose">
    <div class="pose-label">Arms Down</div>
    <model-viewer
      src="model-arms-down.glb?v=arms-down-20260717"
      camera-controls auto-rotate auto-rotate-delay="1500"
      rotation-per-second="24deg" shadow-intensity="0.6" exposure="1.05"
      camera-orbit="0deg 82deg 105%" min-camera-orbit="auto 30deg 60%"
      max-camera-orbit="auto 120deg 250%" interaction-prompt="none">
    </model-viewer>
  </section>
  <section class="pose">
    <div class="pose-label">New Hands</div>
    <model-viewer
      src="model-new-hands.glb?v=new-hands-20260717"
      camera-controls auto-rotate auto-rotate-delay="1500"
      rotation-per-second="24deg" shadow-intensity="0.6" exposure="1.05"
      camera-orbit="0deg 82deg 105%" min-camera-orbit="auto 30deg 60%"
      max-camera-orbit="auto 120deg 250%" interaction-prompt="none">
    </model-viewer>
  </section>
</main>
<footer>Drag to rotate · Scroll to zoom</footer>
</body>
</html>
